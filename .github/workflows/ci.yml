name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check dist exists
        run: |
          test -f dist/index.js || exit 1
          test -f dist/server.js || exit 1
          test -f dist/deepseek-client.js || exit 1
          test -f dist/types.js || exit 1
          test -f dist/config.js || exit 1
          test -f dist/cost.js || exit 1
          test -f dist/schemas.js || exit 1
          test -f dist/errors.js || exit 1
          test -f dist/circuit-breaker.js || exit 1
          test -f dist/session.js || exit 1
          test -f dist/usage-tracker.js || exit 1
          test -f dist/tools/deepseek-chat.js || exit 1
          test -f dist/tools/deepseek-sessions.js || exit 1
          test -f dist/tools/index.js || exit 1
          test -f dist/resources/models.js || exit 1
          test -f dist/resources/config.js || exit 1
          test -f dist/resources/usage.js || exit 1
          test -f dist/resources/index.js || exit 1
          test -f dist/prompts/core.js || exit 1
          test -f dist/prompts/advanced.js || exit 1
          test -f dist/prompts/function-calling.js || exit 1
          test -f dist/prompts/index.js || exit 1
          test -f dist/transport-http.js || exit 1
        shell: bash

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npm run lint

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deepseek-mcp-server:test .

      - name: Run container and test health endpoint
        run: |
          docker run -d --name test-mcp -p 3000:3000 \
            -e DEEPSEEK_API_KEY=test-key \
            -e SKIP_CONNECTION_TEST=true \
            deepseek-mcp-server:test
          sleep 5
          curl -f http://localhost:3000/health || exit 1
          docker stop test-mcp
